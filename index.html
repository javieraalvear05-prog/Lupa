<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leia. | Gestión de Lupa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .grid-layout { display: grid; grid-template-columns: 80px repeat(7, 1fr); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .current-day { background-color: #4f46e5 !important; color: white !important; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-7xl font-extrabold tracking-tighter italic text-indigo-600 leading-none">leia<span class="text-slate-300">.</span></h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400 mt-2 text-center md:text-left">Gestión de Lupa Profesional</p>
            </div>
            <div id="clock" class="text-2xl font-mono font-bold text-indigo-600 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100">00:00:00</div>
        </header>

        <div class="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
            <div class="grid-layout bg-slate-50/80 border-b border-slate-100 sticky top-0 z-20 backdrop-blur-md">
                <div class="p-5 border-r border-slate-100 flex items-center justify-center text-slate-300">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="1">Lunes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="2">Martes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="3">Miércoles</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="4">Jueves</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="5">Viernes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="6">Sábado</div>
                <div class="p-5 text-center font-bold text-[11px] uppercase tracking-widest text-slate-400 day-header" data-day="0">Domingo</div>
            </div>

            <div id="grid-body" class="max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 border border-white">
            <h3 class="text-2xl font-black text-slate-800 italic text-center mb-2">leia<span class="text-indigo-600">.</span> reserva</h3>
            <p id="modal-info" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-8"></p>
            <input type="text" id="user-input" placeholder="Nombre" class="w-full bg-slate-50 border-none ring-2 ring-slate-100 rounded-2xl p-4 text-center font-bold outline-none mb-6 focus:ring-indigo-600/20">
            <div class="flex flex-col gap-2">
                <button id="save-btn" class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Confirmar</button>
                <button onclick="closeModal()" class="w-full py-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN GENÉRICA (Debes poner tus llaves reales aquí para que sea persistente en GitHub)
        const firebaseConfig = {
            apiKey: "AIzaSyB-FakeKeyForDisplay", 
            authDomain: "leia-demo.firebaseapp.com",
            projectId: "leia-demo",
            appId: "1:12345:web:abcde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const reservationsCol = collection(db, "reservations");

        const DAYS = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        let activeKey = null;

        function renderGrid() {
            const grid = document.getElementById('grid-body');
            for (let h = 8; h <= 20; h++) {
                for (let m of ['00', '30']) {
                    const time = `${h.toString().padStart(2, '0')}:${m}`;
                    const row = document.createElement('div');
                    row.className = 'grid-layout border-b border-slate-50';
                    row.innerHTML = `<div class="p-4 border-r border-slate-100 flex items-center justify-center text-[10px] font-mono font-black text-slate-300">${time}</div>`;
                    
                    for (let d = 0; d < 7; d++) {
                        // Reordenar para que empiece en Lunes visualmente (1-6, luego 0)
                        const dayMap = [1, 2, 3, 4, 5, 6, 0];
                        const dayIdx = dayMap[d];
                        const cell = document.createElement('div');
                        cell.className = 'p-1.5 border-r last:border-r-0 border-slate-50 cursor-pointer';
                        cell.innerHTML = `<div id="slot-${dayIdx}-${time}" class="w-full min-h-[45px] rounded-2xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase tracking-tighter border border-dashed border-slate-100 text-slate-200 hover:border-indigo-300 hover:text-indigo-400 transition-all">+ Libre</div>`;
                        cell.onclick = () => openModal(dayIdx, time);
                        row.appendChild(cell);
                    }
                    grid.appendChild(row);
                }
            }
        }

        function openModal(d, t) {
            activeKey = `${d}-${t}`;
            document.getElementById('modal-info').innerText = `${DAYS[d]} • ${t}`;
            document.getElementById('modal').classList.remove('hidden');
        }

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('user-input').value.trim();
            const docRef = doc(db, "reservations", activeKey);
            if (name) await setDoc(docRef, { name });
            else await deleteDoc(docRef);
            closeModal();
        };

        // Escuchar cambios
        onSnapshot(reservationsCol, (snapshot) => {
            snapshot.docChanges().forEach(change => {
                const id = change.doc.id;
                const el = document.getElementById(`slot-${id}`);
                if (el) {
                    if (change.type === "removed") {
                        el.className = "w-full min-h-[45px] rounded-2xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase tracking-tighter border border-dashed border-slate-100 text-slate-200";
                        el.innerText = "+ Libre";
                    } else {
                        el.className = "w-full min-h-[45px] rounded-2xl flex flex-col items-center justify-center p-2 text-center text-[10px] font-bold bg-white border border-indigo-100 shadow-sm text-slate-700";
                        el.innerHTML = `<span>${change.doc.data().name}</span><div class="w-1 h-1 rounded-full bg-indigo-500 mt-1"></div>`;
                    }
                }
            });
        });

        // Reloj y Highlight de día actual
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            const dayIdx = now.getDay();
            document.querySelectorAll('.day-header').forEach(h => {
                if (parseInt(h.dataset.day) === dayIdx) h.classList.add('current-day');
                else h.classList.remove('current-day');
            });
        }, 1000);

        renderGrid();
    </script>
</body>
</html>
