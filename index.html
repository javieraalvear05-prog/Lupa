<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leia. | Gestión de Horarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #f5f3ff, #ffffff); color: #1e293b; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-tab { background: #7c3aed !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3); }
        .grid-layout { display: grid; grid-template-columns: 100px 1fr; }
        .week-grid { display: grid; grid-template-columns: 100px repeat(7, minmax(150px, 1fr)); }
        .day-grid { display: grid; grid-template-columns: 100px 1fr; }
        .slot-reserved { background: #7c3aed; color: white; border: none !important; box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-4 lg:p-10">
    <div class="max-w-7xl mx-auto">
        <!-- Encabezado -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-8">
            <div class="text-center md:text-left">
                <h1 class="text-6xl lg:text-8xl font-[900] tracking-tighter text-violet-600 italic leading-none">Leia<span class="text-violet-200">.</span></h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-violet-400 mt-3">Instrumentación Óptica de Precisión</p>
            </div>
            
            <!-- Selector de Semana -->
            <div class="flex items-center gap-4 bg-white/80 p-2 px-4 rounded-3xl border border-violet-100 shadow-sm">
                <button onclick="changeWeek(-1)" class="p-2 hover:bg-violet-100 rounded-full transition-colors text-violet-600">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="text-center min-w-[180px]">
                    <p id="week-label" class="text-[10px] font-black text-violet-300 uppercase tracking-widest leading-none mb-1">Cargando...</p>
                    <p id="clock" class="text-xl font-mono font-bold text-violet-600 leading-none">--:--:--</p>
                </div>
                <button onclick="changeWeek(1)" class="p-2 hover:bg-violet-100 rounded-full transition-colors text-violet-600">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </header>

        <!-- Selectores de Vista -->
        <div class="flex flex-col lg:flex-row gap-6 mb-8 items-center justify-between">
            <div class="flex p-1.5 bg-violet-100/40 rounded-2xl w-fit border border-violet-100/50">
                <button id="btn-day-view" onclick="setView('day')" class="px-8 py-3 rounded-xl text-xs font-bold transition-all active-tab">Vista Día</button>
                <button id="btn-week-view" onclick="setView('week')" class="px-8 py-3 rounded-xl text-xs font-bold transition-all text-violet-400">Vista Semana</button>
            </div>
            <nav id="day-selector" class="flex gap-2 overflow-x-auto no-scrollbar max-w-full pb-2 transition-opacity duration-300"></nav>
        </div>

        <!-- Tabla de Horarios -->
        <div class="bg-white/90 rounded-[3rem] shadow-2xl border border-violet-50 overflow-hidden flex flex-col glass animate-fade">
            <div id="grid-container" class="overflow-x-auto custom-scrollbar">
                <div id="grid-header" class="grid-layout bg-violet-50/40 border-b border-violet-100 sticky top-0 z-20 backdrop-blur-md"></div>
                <div id="grid-body" class="max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
            </div>
        </div>

        <!-- Pie de página -->
        <footer class="mt-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="inline-flex items-center gap-3 bg-white px-6 py-3 rounded-full border border-violet-100 shadow-sm text-[10px] font-bold text-violet-400 uppercase tracking-widest">
                <span id="sync-indicator" class="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
                <span id="sync-text">Conectando con la nube...</span>
            </div>
            <p class="text-[10px] font-bold text-violet-300 uppercase tracking-widest italic opacity-70">Sistema de calendario real. Reserva cualquier fecha futura.</p>
        </footer>
    </div>

    <!-- Modal de Reserva -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-violet-950/30 backdrop-blur-md hidden">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] shadow-2xl p-12 border border-white transform animate-fade">
            <h3 class="text-3xl font-black text-slate-800 italic text-center leading-none">Leia<span class="text-violet-600">.</span> booking</h3>
            <p id="modal-info" class="text-[10px] font-bold text-violet-300 uppercase tracking-widest text-center mt-4 mb-8"></p>
            
            <div id="modal-error" class="hidden bg-red-50 text-red-600 text-[10px] font-bold p-4 rounded-2xl mb-6 text-center border border-red-100"></div>

            <input type="text" id="name-input" placeholder="Tu nombre" class="w-full bg-violet-50/50 border-none ring-2 ring-violet-100 focus:ring-4 focus:ring-violet-600/10 focus:bg-white rounded-2xl p-6 text-center font-bold text-slate-700 outline-none text-lg" maxlength="20">
            
            <div class="flex flex-col gap-3 mt-6">
                <button id="save-btn" class="w-full py-5 rounded-2xl bg-violet-600 text-white font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all disabled:opacity-50">Confirmar Registro</button>
                <button id="cancel-btn" class="w-full py-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest hover:text-violet-500">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDipSTDGZjZ5iw8W5SMuxn3h1-0eckLW7A",
            authDomain: "lupa-6bee5.firebaseapp.com",
            projectId: "lupa-6bee5",
            storageBucket: "lupa-6bee5.firebasestorage.app",
            messagingSenderId: "127097482963",
            appId: "1:127097482963:web:6022b0b823aa3092386e26"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'leia-calendar-v1';
        const DAYS = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const DAY_ORDER = [1, 2, 3, 4, 5, 6, 0];
        
        let currentView = 'day';
        let db = null, auth = null, isReady = false, unsubscribe = null;
        
        let anchorDate = new Date();
        anchorDate.setHours(0,0,0,0);
        
        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        let currentMonday = getMonday(anchorDate);
        let selectedDayIndex = new Date().getDay();
        let activeKey = null;

        // Inicialización de Nube
        async function initCloud() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                await signInAnonymously(auth);
                isReady = true;
                
                document.getElementById('sync-indicator').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse';
                document.getElementById('sync-text').innerText = 'Nube Conectada';
                
                renderGrid(); 
            } catch (e) {
                console.error("Cloud Error:", e);
                document.getElementById('sync-text').innerText = 'Error de conexión';
                document.getElementById('sync-indicator').className = 'w-2.5 h-2.5 rounded-full bg-red-400';
            }
        }

        // Navegación
        window.changeWeek = (dir) => {
            currentMonday.setDate(currentMonday.getDate() + (dir * 7));
            updateWeekLabel();
            renderDaySelector();
            renderGrid();
        };

        function updateWeekLabel() {
            const end = new Date(currentMonday);
            end.setDate(end.getDate() + 6);
            const options = { day: 'numeric', month: 'short' };
            document.getElementById('week-label').innerText = `Semana: ${currentMonday.toLocaleDateString('es-ES', options)} - ${end.toLocaleDateString('es-ES', options)}`;
        }

        // Renderizado de UI
        function renderDaySelector() {
            const nav = document.getElementById('day-selector');
            if (!nav) return; nav.innerHTML = '';
            DAY_ORDER.forEach(d => {
                const date = new Date(currentMonday);
                const offset = d === 0 ? 6 : d - 1;
                date.setDate(date.getDate() + offset);
                
                const btn = document.createElement('button');
                const isSelected = selectedDayIndex === d;
                btn.className = `px-5 py-3 rounded-2xl text-[10px] font-bold border transition-all ${isSelected ? 'active-tab border-violet-600' : 'bg-white text-violet-400 border-violet-50'}`;
                btn.innerHTML = `<div class="flex flex-col items-center"><span>${DAYS[d]}</span><span class="text-[8px] opacity-60">${date.getDate()}</span></div>`;
                btn.onclick = () => { 
                    selectedDayIndex = d; 
                    if (currentView === 'day') renderGrid(); 
                    renderDaySelector(); 
                };
                nav.appendChild(btn);
            });
            nav.style.opacity = currentView === 'day' ? '1' : '0';
        }

        window.setView = (v) => {
            currentView = v;
            document.getElementById('btn-day-view').className = `px-8 py-3 rounded-xl text-xs font-bold transition-all ${v==='day'?'active-tab':'text-violet-400'}`;
            document.getElementById('btn-week-view').className = `px-8 py-3 rounded-xl text-xs font-bold transition-all ${v==='week'?'active-tab':'text-violet-400'}`;
            renderDaySelector(); 
            renderGrid();
        }

        window.openBooking = (dateStr, time, dayName) => { 
            activeKey = `${dateStr}-${time}`; 
            document.getElementById('modal-info').innerText = `${dayName} ${dateStr.split('-').reverse().slice(0,2).join('/')} • ${time} HS`; 
            document.getElementById('modal-error').classList.add('hidden');
            
            const el = document.getElementById(`slot-${activeKey}`);
            document.getElementById('name-input').value = el && el.classList.contains('slot-reserved') ? el.getAttribute('data-name') : "";
            
            document.getElementById('modal').classList.remove('hidden'); 
            setTimeout(()=>document.getElementById('name-input').focus(), 150); 
        };

        window.closeModal = () => { 
            document.getElementById('modal').classList.add('hidden'); 
            document.getElementById('name-input').value = ""; 
        };

        function renderGrid() {
            const header = document.getElementById('grid-header'), body = document.getElementById('grid-body');
            header.className = currentView === 'week' ? 'week-grid bg-violet-50/40 border-b border-violet-100 sticky top-0 z-20 backdrop-blur-md' : 'day-grid bg-violet-50/40 border-b border-violet-100 sticky top-0 z-20 backdrop-blur-md';
            header.innerHTML = '<div class="p-5 border-r border-violet-100"></div>';
            
            const daysToRender = currentView === 'week' ? DAY_ORDER : [selectedDayIndex];
            
            daysToRender.forEach(d => {
                const date = new Date(currentMonday);
                const offset = d === 0 ? 6 : d - 1;
                date.setDate(date.getDate() + offset);
                
                const h = document.createElement('div');
                h.className = 'p-5 text-center border-r last:border-r-0 border-violet-100 font-bold text-[10px] uppercase text-violet-600 flex flex-col';
                h.innerHTML = `<span>${DAYS[d]}</span><span class="text-[8px] text-violet-300 font-black">${date.getDate()} ${date.toLocaleDateString('es-ES', {month: 'short'})}</span>`;
                header.appendChild(h);
            });

            body.innerHTML = '';
            for (let h = 8; h <= 20; h++) {
                const time = `${h.toString().padStart(2, '0')}:00`, row = document.createElement('div');
                row.className = currentView === 'week' ? 'week-grid border-b border-violet-50 group' : 'day-grid border-b border-violet-50 group';
                const tl = document.createElement('div');
                tl.className = 'p-4 border-r border-violet-100 flex items-center justify-center text-[12px] font-mono font-black text-violet-200 bg-slate-50/20';
                tl.innerText = time; row.appendChild(tl);
                
                daysToRender.forEach(d => {
                    const date = new Date(currentMonday);
                    const offset = d === 0 ? 6 : d - 1;
                    date.setDate(date.getDate() + offset);
                    const dateStr = date.toISOString().split('T')[0];
                    const slotId = `${dateStr}-${time}`;

                    const cell = document.createElement('div'), inner = document.createElement('div');
                    cell.className = 'p-2 border-r last:border-r-0 border-violet-50/50';
                    inner.id = `slot-${slotId}`;
                    inner.className = 'slot-inner w-full min-h-[75px] rounded-3xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase border border-dashed border-violet-100 text-violet-200 cursor-pointer hover:bg-white transition-all';
                    inner.innerText = '+ Disponible'; 
                    inner.onclick = () => window.openBooking(dateStr, time, DAYS[d]);
                    cell.appendChild(inner); row.appendChild(cell);
                });
                body.appendChild(row);
            }
            if (isReady) listenData();
        }

        // Escucha en tiempo real
        function listenData() {
            if (!db || !isReady) return;
            if (unsubscribe) unsubscribe();
            
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
            unsubscribe = onSnapshot(colRef, (snap) => {
                // Reset visual
                document.querySelectorAll('.slot-inner.slot-reserved').forEach(el => {
                    el.className = 'slot-inner w-full min-h-[75px] rounded-3xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase border border-dashed border-violet-100 text-violet-200 cursor-pointer hover:bg-white transition-all';
                    el.innerText = '+ Disponible';
                    el.removeAttribute('data-name');
                });

                snap.forEach(docSnap => {
                    const el = document.getElementById(`slot-${docSnap.id}`);
                    if (el) {
                        const name = docSnap.data().name;
                        el.className = 'slot-inner w-full min-h-[75px] rounded-3xl flex flex-col items-center justify-center p-2 text-center text-[11px] font-bold slot-reserved cursor-pointer transition-all scale-[0.98]';
                        el.setAttribute('data-name', name);
                        el.innerHTML = `<span class="truncate w-full px-2 uppercase tracking-tight">${name}</span><div class="w-2 h-2 rounded-full bg-white/30 mt-2 animate-pulse"></div>`;
                    }
                });
            }, (error) => {
                console.error("Snapshot Error:", error);
            });
        }

        // Guardar Turno
        document.getElementById('save-btn').onclick = async () => {
            if (!db || !isReady) return;
            const nameInput = document.getElementById('name-input');
            const saveBtn = document.getElementById('save-btn');
            const errorDiv = document.getElementById('modal-error');
            const name = nameInput.value.trim();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reservations', activeKey);
            
            saveBtn.disabled = true;
            saveBtn.innerText = "Sincronizando...";
            errorDiv.classList.add('hidden');

            try { 
                if (name === "") {
                    await deleteDoc(docRef); 
                } else {
                    await setDoc(docRef, { name, ts: Date.now() }); 
                }
                window.closeModal(); 
            } catch (e) { 
                console.error("Save Error:", e);
                errorDiv.innerText = "Error de Permisos: Ve a Firebase Console > Firestore > Rules y asegúrate de que permitan escritura.";
                errorDiv.classList.remove('hidden');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Confirmar Registro";
            }
        };

        document.getElementById('cancel-btn').onclick = () => window.closeModal();

        // Inicio
        function startApp() { 
            updateWeekLabel();
            renderDaySelector();
            renderGrid();
            initCloud();
            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES', { hour12: false }); 
            }, 1000);
        }
        startApp();
        
        // Asignar funciones globales para onclick
        window.changeWeek = changeWeek;
        window.setView = setView;
        window.closeModal = closeModal;
        window.openBooking = openBooking;

    </script>
</body>
</html>
