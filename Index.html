<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leia - Gestión Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .slot-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-800">

    <div class="min-h-screen flex flex-col p-4 xl:p-10 max-w-[1600px] mx-auto">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-7xl font-[900] tracking-tighter text-indigo-600 italic leading-none">
                    leia<span class="text-indigo-200">.</span>
                </h1>
                <p class="text-slate-400 font-bold tracking-[0.3em] text-[9px] mt-2 uppercase">Gestión Global de Lupa de Precisión</p>
            </div>
            
            <div class="flex items-center gap-4 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100">
                <div class="text-right">
                    <div class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Tiempo Actual</div>
                    <div id="clock" class="text-xl font-mono font-black text-indigo-600 leading-none">00:00:00</div>
                </div>
                <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
            </div>
        </header>

        <!-- Main Schedule Card -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/40 border border-slate-100 flex flex-col flex-1 overflow-hidden">
            <!-- Day Labels -->
            <div id="day-labels" class="grid grid-cols-[80px_repeat(7,1fr)] bg-slate-50/80 border-b border-slate-100 sticky top-0 z-10 backdrop-blur-md text-center font-black text-[10px] uppercase tracking-widest text-slate-400">
                <div class="p-4 border-r border-slate-100 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="p-4 border-r border-slate-100" data-day="0">Lunes</div>
                <div class="p-4 border-r border-slate-100" data-day="1">Martes</div>
                <div class="p-4 border-r border-slate-100" data-day="2">Miércoles</div>
                <div class="p-4 border-r border-slate-100" data-day="3">Jueves</div>
                <div class="p-4 border-r border-slate-100" data-day="4">Viernes</div>
                <div class="p-4 border-r border-slate-100" data-day="5">Sábado</div>
                <div class="p-4" data-day="6">Domingo</div>
            </div>

            <!-- Scrollable Slots -->
            <div id="schedule-body" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Se genera dinámicamente -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 flex justify-center gap-6">
            <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-white border border-slate-100 shadow-sm">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Sincronización en la nube activa</span>
            </div>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-indigo-950/20 backdrop-blur-xl hidden">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 border border-white">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-indigo-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <h3 class="text-2xl font-black text-slate-800 tracking-tighter italic">leia<span class="text-indigo-600">.</span> reserva</h3>
                <p id="modal-subtitle" class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] mt-2">Día • Hora</p>
            </div>
            <input type="text" id="user-name" placeholder="Tu nombre" class="w-full bg-slate-50 border-none ring-2 ring-slate-100 focus:ring-4 focus:ring-indigo-600/10 focus:bg-white rounded-2xl p-4 text-slate-800 placeholder:text-slate-300 font-bold transition-all outline-none mb-6 text-center">
            <div class="flex flex-col gap-2">
                <button id="save-btn" class="w-full py-4 rounded-2xl font-black bg-indigo-600 text-white shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 uppercase tracking-widest text-[10px]">Confirmar</button>
                <button onclick="closeModal()" class="w-full py-3 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-colors text-[9px] uppercase tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'leia-lupa-html-v1';
        
        const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
        const START_HOUR = 8;
        const END_HOUR = 21;
        const INTERVAL = 30;

        let reservations = {};
        let activeSlotKey = null;

        // Inicialización
        async function init() {
            await signInAnonymously(auth);
            renderBaseGrid();
            startClock();
            listenToData();
        }

        function renderBaseGrid() {
            const body = document.getElementById('schedule-body');
            body.innerHTML = '';
            
            for (let h = START_HOUR; h < END_HOUR; h++) {
                for (let m = 0; m < 60; m += INTERVAL) {
                    const timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    const row = document.createElement('div');
                    row.className = 'grid grid-cols-[80px_repeat(7,1fr)] border-b border-slate-50 group hover:bg-slate-50/30 transition-colors';
                    
                    // Time label
                    const timeLabel = document.createElement('div');
                    timeLabel.className = 'p-3 flex items-center justify-center border-r border-slate-100 bg-slate-50/20 text-[10px] font-mono font-black text-slate-300';
                    timeLabel.innerText = timeStr;
                    row.appendChild(timeLabel);

                    // Day slots
                    for (let d = 0; d < 7; d++) {
                        const slot = document.createElement('div');
                        slot.id = `slot-${d}-${timeStr}`;
                        slot.className = 'p-1.5 border-r last:border-r-0 border-slate-50 cursor-pointer';
                        slot.onclick = () => openModal(d, timeStr);
                        
                        const inner = document.createElement('div');
                        inner.className = 'w-full min-h-[42px] rounded-xl flex items-center justify-center px-2 py-1 text-center transition-all duration-300 border border-dashed border-slate-100 text-[10px] font-black text-slate-200 uppercase tracking-tighter hover:border-indigo-200 hover:text-indigo-300';
                        inner.innerText = '+ Reservar';
                        
                        slot.appendChild(inner);
                        row.appendChild(slot);
                    }
                    body.appendChild(row);
                }
            }
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            const dayLabels = document.querySelectorAll('#day-labels div[data-day]');
            
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString();
                
                // Highlight today
                const todayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
                dayLabels.forEach(el => {
                    if (parseInt(el.dataset.day) === todayIdx) {
                        el.className = 'p-4 border-r border-slate-100 bg-indigo-600 text-white';
                    } else {
                        el.className = 'p-4 border-r border-slate-100';
                    }
                });
            }, 1000);
        }

        function listenToData() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
            onSnapshot(colRef, (snapshot) => {
                const now = new Date();
                const currentDayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
                const currentMins = now.getHours() * 60 + now.getMinutes();

                snapshot.forEach(docSnap => {
                    const id = docSnap.id; // "day-time"
                    const name = docSnap.data().name;
                    const [dStr, tStr] = id.split('-');
                    const d = parseInt(dStr);
                    const [h, m] = tStr.split(':').map(Number);
                    const slotEnd = h * 60 + m + INTERVAL;

                    // Auto-limpieza
                    if (d < currentDayIdx || (d === currentDayIdx && currentMins >= slotEnd)) {
                        deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id));
                        updateSlotUI(id, null);
                    } else {
                        updateSlotUI(id, name);
                    }
                });

                // Limpiar visualmente slots que ya no existen en DB
                const currentKeys = snapshot.docs.map(d => d.id);
                document.querySelectorAll('[id^="slot-"]').forEach(el => {
                    const key = el.id.replace('slot-', '');
                    if (!currentKeys.includes(key)) updateSlotUI(key, null);
                });
            });
        }

        function updateSlotUI(key, name) {
            const el = document.getElementById(`slot-${key}`);
            if (!el) return;
            const inner = el.firstChild;
            
            if (name) {
                inner.className = 'w-full min-h-[42px] rounded-xl flex flex-col items-center justify-center px-2 py-1 text-center transition-all duration-300 bg-white border border-indigo-100 shadow-sm text-slate-700 font-bold text-[10px]';
                inner.innerHTML = `<span class="truncate w-full">${name}</span><div class="w-1 h-1 rounded-full bg-indigo-500 mt-1"></div>`;
            } else {
                inner.className = 'w-full min-h-[42px] rounded-xl flex items-center justify-center px-2 py-1 text-center transition-all duration-300 border border-dashed border-slate-100 text-[10px] font-black text-slate-200 uppercase tracking-tighter hover:border-indigo-200 hover:text-indigo-300';
                inner.innerText = '+ Reservar';
            }
        }

        function openModal(day, time) {
            activeSlotKey = `${day}-${time}`;
            document.getElementById('modal-subtitle').innerText = `${DAYS[day]} • ${time}`;
            document.getElementById('user-name').value = reservations[activeSlotKey] || "";
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('user-name').focus();
        }

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
        }

        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('user-name').value.trim();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reservations', activeSlotKey);
            
            if (name === "") {
                await deleteDoc(docRef);
            } else {
                await setDoc(docRef, { name, timestamp: Date.now() });
            }
            closeModal();
        };

        init();
    </script>
</body>
</html>
