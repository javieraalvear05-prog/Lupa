<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leia. | Sistema de Gestión Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .grid-layout {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
        }
        
        .slot-active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .current-day-header {
            background-color: #4f46e5;
            color: white !important;
        }

        @media (max-width: 1024px) {
            .grid-container {
                overflow-x: auto;
            }
            .grid-layout {
                min-width: 1000px;
            }
        }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-[1600px] mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-7xl font-extrabold tracking-tighter italic text-indigo-600 leading-none">
                    leia<span class="text-slate-300">.</span>
                </h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400 mt-2">Gestión de Lupa Profesional</p>
            </div>

            <div class="flex items-center gap-4 bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Hora Sistema</p>
                    <p id="digital-clock" class="text-2xl font-mono font-bold text-indigo-600 mt-1">00:00:00</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
            </div>
        </header>

        <!-- Main Board -->
        <div class="bg-white rounded-[3rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 overflow-hidden flex flex-col">
            
            <!-- Days Row -->
            <div class="grid-layout bg-slate-50/80 border-b border-slate-100 sticky top-0 z-20 backdrop-blur-md">
                <div class="p-5 border-r border-slate-100 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="0">Lunes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="1">Martes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="2">Miércoles</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="3">Jueves</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="4">Viernes</div>
                <div class="p-5 text-center border-r border-slate-100 font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="5">Sábado</div>
                <div class="p-5 text-center font-bold text-[11px] uppercase tracking-widest text-slate-400" data-day="6">Domingo</div>
            </div>

            <!-- Body Grid -->
            <div id="grid-body" class="flex-1 overflow-y-auto custom-scrollbar max-h-[65vh]">
                <!-- Dinámico -->
            </div>
        </div>

        <!-- Feedback -->
        <footer class="mt-8 flex justify-center gap-4">
            <div class="bg-white px-6 py-3 rounded-full border border-slate-100 shadow-sm flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sincronización Cloud Activa</span>
            </div>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/10 backdrop-blur-md hidden">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 border border-white transform transition-all">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-indigo-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <h3 class="text-2xl font-black text-slate-800 italic">leia<span class="text-indigo-600">.</span> booking</h3>
                <p id="modal-info" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Día - Hora</p>
            </div>
            
            <input type="text" id="user-input" placeholder="Nombre completo" class="w-full bg-slate-50 border-none ring-2 ring-slate-100 focus:ring-4 focus:ring-indigo-600/10 focus:bg-white rounded-2xl p-4 text-center font-bold text-slate-700 transition-all outline-none mb-6">
            
            <div class="flex flex-col gap-3">
                <button id="save-btn" class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase text-[10px] tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">Confirmar Turno</button>
                <button onclick="closeModal()" class="w-full py-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:bg-slate-50 rounded-2xl transition-all">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'leia-lupa-global';

        const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
        const START = 8;
        const END = 21;
        const INTERVAL = 30;

        let activeKey = null;

        // Inicializar
        async function start() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            renderGrid();
            updateTime();
            setInterval(updateTime, 1000);
            
            // Escuchar cambios
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
            onSnapshot(colRef, (snapshot) => {
                const now = new Date();
                const todayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
                const currentMins = now.getHours() * 60 + now.getMinutes();

                // Limpiar UI primero
                document.querySelectorAll('.inner-slot').forEach(el => clearUI(el));

                snapshot.forEach(docSnap => {
                    const id = docSnap.id;
                    const name = docSnap.data().name;
                    const [dStr, tStr] = id.split('-');
                    const d = parseInt(dStr);
                    const [h, m] = tStr.split(':').map(Number);
                    const endMins = h * 60 + m + INTERVAL;

                    // AUTO-LIMPIEZA: Si el bloque ya pasó, borrar de la DB
                    if (d < todayIdx || (d === todayIdx && currentMins >= endMins)) {
                        deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id));
                    } else {
                        applyUI(id, name);
                    }
                });
            });
        }

        function renderGrid() {
            const container = document.getElementById('grid-body');
            container.innerHTML = '';

            for (let h = START; h < END; h++) {
                for (let m = 0; m < 60; m += INTERVAL) {
                    const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    const row = document.createElement('div');
                    row.className = 'grid-layout border-b border-slate-50 hover:bg-slate-50/50 transition-colors';
                    
                    const label = document.createElement('div');
                    label.className = 'p-4 border-r border-slate-100 flex items-center justify-center text-[10px] font-mono font-black text-slate-300';
                    label.innerText = time;
                    row.appendChild(label);

                    for (let d = 0; d < 7; d++) {
                        const cell = document.createElement('div');
                        cell.className = 'p-1.5 border-r last:border-r-0 border-slate-50 cursor-pointer';
                        cell.onclick = () => openModal(d, time);
                        
                        const inner = document.createElement('div');
                        inner.id = `inner-${d}-${time}`;
                        inner.className = 'inner-slot w-full min-h-[45px] rounded-2xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase tracking-tighter border border-dashed border-slate-100 text-slate-200 transition-all hover:border-indigo-200 hover:text-indigo-400';
                        inner.innerText = '+ Reservar';
                        
                        cell.appendChild(inner);
                        row.appendChild(cell);
                    }
                    container.appendChild(row);
                }
            }
        }

        function applyUI(id, name) {
            const el = document.getElementById(`inner-${id}`);
            if (!el) return;
            el.className = 'inner-slot w-full min-h-[45px] rounded-2xl flex flex-col items-center justify-center p-2 text-center text-[10px] font-bold bg-white border border-indigo-100 shadow-sm text-slate-700 transition-all';
            el.innerHTML = `<span class="truncate w-full">${name}</span><div class="w-1 h-1 rounded-full bg-indigo-500 mt-1 animate-pulse"></div>`;
        }

        function clearUI(el) {
            el.className = 'inner-slot w-full min-h-[45px] rounded-2xl flex items-center justify-center p-2 text-center text-[9px] font-black uppercase tracking-tighter border border-dashed border-slate-100 text-slate-200 transition-all hover:border-indigo-200 hover:text-indigo-400';
            el.innerText = '+ Reservar';
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString();
            
            const todayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
            document.querySelectorAll('[data-day]').forEach(el => {
                if (parseInt(el.dataset.day) === todayIdx) {
                    el.classList.add('current-day-header');
                } else {
                    el.classList.remove('current-day-header');
                }
            });
        }

        window.openModal = (d, t) => {
            activeKey = `${d}-${t}`;
            document.getElementById('modal-info').innerText = `${DAYS[d]} • ${t}`;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('user-input').focus();
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('user-input').value = '';
        };

        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('user-input').value.trim();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reservations', activeKey);
            
            if (name === "") {
                await deleteDoc(docRef);
            } else {
                await setDoc(docRef, { name, ts: Date.now() });
            }
            closeModal();
        };

        start();
    </script>
</body>
</html>
